version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: UTC
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
      timezone: UTC
    open-pull-requests-limit: 10
    groups:
      npm-production:
        dependency-type: production
        patterns:
          - "*"
      npm-development:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: UTC
    open-pull-requests-limit: 10
    groups:
      composer-production:
        dependency-type: production
        patterns:
          - "*"
      composer-development:
        dependency-type: development
        patterns:
          - "*"