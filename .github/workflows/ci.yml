name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  phpunit-and-migrations:
    runs-on: ubuntu-latest

    services:
      db:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: sdo
          MARIADB_USER: sdo_admin
          MARIADB_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: sdo
      DB_USER: sdo_admin
      DB_PASS: password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql
          coverage: none

      - name: Validate composer files
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run migrations
        run: php vendor/bin/phinx migrate -e development

      - name: Verify migration status
        run: php vendor/bin/phinx status -e development

      - name: Run PHPUnit
        run: php vendor/bin/phpunit --configuration phpunit.xml
