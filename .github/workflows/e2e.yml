name: E2E

'on':
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      db:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: sdo
          MARIADB_USER: sdo_admin
          MARIADB_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: sdo
      DB_USER: sdo_admin
      DB_PASS: password
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      APP_ENV: production
      APP_DEBUG: false
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: '8.4'
          extensions: pdo_mysql
          coverage: none

      - name: Cache Composer downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-8.4-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-composer-

      - name: Cache vendor directory
        id: cache-vendor
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.4-vendor-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-vendor-

      - name: Validate composer files
        run: composer validate --strict

      - name: Install dependencies
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Write runtime environment file
        run: |
          cat <<EOF > .env
          DB_HOST=${DB_HOST}
          DB_PORT=${DB_PORT}
          DB_NAME=${DB_NAME}
          DB_USER=${DB_USER}
          DB_PASS=${DB_PASS}
          REDIS_HOST=${REDIS_HOST}
          REDIS_PORT=${REDIS_PORT}
          APP_ENV=${APP_ENV}
          APP_DEBUG=${APP_DEBUG}
          EOF

      - name: Run migrations
        run: php vendor/bin/phinx migrate -e development

      - name: Seed baseline game data
        run: |
          php vendor/bin/phinx seed:run -e development -s InitialDataSeeder
          php vendor/bin/phinx seed:run -e development -s ArmorySeeder

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14
