services:
  app:
    build: .
    container_name: sdo_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DATABASE_URL=mysql://sdo_admin:password@db:3306/sdo
      - REDIS_URL=redis://redis:6379
      - APP_ENV=development
    depends_on:
      - db
      - redis

  vite:
    build: .
    container_name: sdo_vite
    command: npm run dev -- --host 0.0.0.0 --port 5173 --strictPort
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html

  db:
    image: mariadb:11.4
    container_name: sdo_db
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=root
      - MARIADB_DATABASE=sdo
      - MARIADB_USER=sdo_admin
      - MARIADB_PASSWORD=password
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: sdo_redis
    volumes:
      - redis_data:/data

  scheduler:
    build: .
    container_name: sdo_scheduler
    command: bash -c "while true; do php bin/tick-worker.php; sleep 900; done"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
      - redis

volumes:
  db_data:
  redis_data: